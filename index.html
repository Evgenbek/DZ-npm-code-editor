<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>code-editor</title>

    <link
      href="https://unpkg.com/grapesjs/dist/css/grapes.min.css"
      rel="stylesheet"
    />
    <link
      href="./node_modules/grapesjs-component-code-editor/dist/grapesjs-component-code-editor.min.css"
      rel="stylesheet"
    />

    <style>
      body,
      html {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <script src="https://unpkg.com/grapesjs"></script>

    <script src="./node_modules/grapesjs-component-code-editor/dist/grapesjs-component-code-editor.min.js"></script>

    <script src="./node_modules/split.js/dist/split.js"></script>

    <div id="gjs"></div>

    <script type="text/javascript">
      var editor = grapesjs.init({
        container: '#gjs',
        // ...
        panels: {
          /* add panel button with command open-code */
        },
        plugins: ['grapesjs-component-code-editor'],
        pluginsOpts: {
          'grapesjs-component-code-editor': {
            /* options */
          },
        },
      });

      const pn = editor.Panels;
      const panelViews = pn.addPanel({
        id: 'views',
      });
      panelViews.get('buttons').add([
        {
          attributes: {
            title: 'Open Code',
          },
          className: 'fa fa-file-code-o',
          command: 'open-code',
          togglable: false, //do not close when button is clicked again
          id: 'open-code',
        },
      ]);
    </script>
  </body>
</html>
